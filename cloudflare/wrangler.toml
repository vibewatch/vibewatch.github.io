name = "website-scheduler"
main = "worker.js"
compatibility_date = "2024-09-23"

# Fire exactly at the UTC times used by the website GitHub Actions schedules.
[triggers]
crons = ["0 1-4 * * *", "30 1 * * *"]

# Secrets are NOT stored here. Set them via:
#   npx wrangler secret put GITHUB_TOKEN
#   npx wrangler secret put GITHUB_REPO
#
# Optional:
#   npx wrangler secret put GITHUB_REF
#
# GITHUB_TOKEN - Fine-grained PAT: Actions: Read & Write on the target repo
# GITHUB_REPO  - "owner/repo", e.g. "vibewatch/vibewatch.github.io"
# GITHUB_REF   - Git ref to dispatch, defaults to "main"

[observability]
[observability.logs]
enabled = true
invocation_logs = true

[observability.traces]
enabled = true
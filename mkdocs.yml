site_name: Daily Social Signals
site_url: https://vibewatch.github.io/
site_description: Daily social signals — surfacing themes, pain points, and more from the social web.
copyright: "©2026 GenisisIQ"

theme:
  name: material
  custom_dir: overrides
  font: false
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - search.suggest
    - search.highlight
    - toc.follow
    - content.tooltips

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true

plugins:
  - search
  - awesome-pages
  - i18n:
      docs_structure: suffix
      reconfigure_material: true
      reconfigure_search: true
      languages:
        - locale: en
          name: English
          default: true
          build: true
        - locale: zh
          name: 中文
          build: true
          site_name: 每日社交信号
          site_description: 每日社交信号 — 从 Reddit 和 Twitter 挖掘主题、痛点和新兴话题。
          copyright: "©2026 GenisisIQ"
          nav_translations:
            Daily Social Signals: 每日社交信号
            Reddit: Reddit
            Twitter: Twitter
            AI: AI
            AI Agent: AI 智能体
            AI Coding: AI 编程
  - macros

extra:
  analytics:
    provider: google
    property: G-B3FDBWD72F
  sources:
    reddit:
      label: Reddit
      icon: ":material-reddit:"
    twitter:
      label: Twitter
      icon: ":fontawesome-brands-x-twitter:"
  topics:
    ai:
      label: AI
      description: Broad AI trends, breakthroughs, and industry shifts.
    ai-agent:
      label: AI Agent
      description: Autonomous agents, tool use, and agentic workflows.
    ai-coding:
      label: AI Coding
      description: AI-assisted development, code generation, and developer tooling.

hooks:
  - hooks/title.py

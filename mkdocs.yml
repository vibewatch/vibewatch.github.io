site_name: Daily Social Signals
site_url: https://vibewatch.github.io/
site_description: Daily social signals — surfacing themes, pain points, and more from the social web.
copyright: "©2026 GenisisIQ"

theme:
  name: material
  custom_dir: overrides
  font: false
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - navigation.instant
    - search.suggest
    - search.highlight
    - toc.follow
    - content.tooltips

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true

plugins:
  - search
  - awesome-pages
  - macros

extra:
  sources:
    reddit:
      label: Reddit
      icon: ":material-reddit:"
    twitter:
      label: Twitter
      icon: ":fontawesome-brands-x-twitter:"
  topics:
    ai-agent:
      label: AI Agents
      description: Key themes, pain points, and emerging topics.

hooks:
  - hooks/title.py

site_name: AI Pulse Daily
site_url: https://genisisiq.com/
site_description: AI Pulse Daily — surfacing themes, pain points, and more from the social web.
copyright: "©2026 GenisisIQ"

theme:
  name: material
  custom_dir: overrides
  font: false
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - search.suggest
    - search.highlight
    - toc.follow
    - content.tooltips

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/external-links.js
  - javascripts/subscribe.js

markdown_extensions:
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true

plugins:
  - search
  - awesome-pages
  - i18n:
      docs_structure: suffix
      reconfigure_material: true
      reconfigure_search: true
      languages:
        - locale: en
          name: English
          default: true
          build: true
        - locale: zh
          name: 中文
          build: true
          site_name: AI趋势速递
          site_description: AI趋势速递 — 从 Reddit、Twitter 和 HackerNews 挖掘主题、痛点和新兴话题。
          copyright: "©2026 GenisisIQ"
          nav_translations:
            AI Pulse Daily: AI趋势速递
            Reddit: Reddit
            Twitter: Twitter
            HackerNews: HackerNews
            AI: AI
            AI Agent: AI 智能体
            AI Coding: AI 编程
  - macros

extra:
  analytics:
    provider: google
    property: G-B3FDBWD72F
  sources:
    twitter:
      label: Twitter
      icon: ":fontawesome-brands-x-twitter:"
    reddit:
      label: Reddit
      icon: ":material-reddit:"
    hackernews:
      label: HackerNews
      icon: ":fontawesome-brands-hacker-news:"
  topics:
    ai:
      label: AI
      description: Broad AI trends, breakthroughs, and industry shifts.
      description_zh: AI 前沿趋势、行业动态与重大变革。
    ai-agent:
      label: AI Agent
      description: Autonomous agents, tool use, and agentic workflows.
      description_zh: 自主智能体、工具调用与智能体工作流。
    ai-coding:
      label: AI Coding
      description: AI-assisted development, code generation, and developer tooling.
      description_zh: AI 辅助开发、代码生成与开发者工具。

hooks:
  - hooks/title.py
  - hooks/nav_prune.py

name: Build HackerNews reports

on:
  workflow_dispatch:
  schedule:
    - cron: '0 1 * * *'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  build-hackernews-reports:
    name: Generate HackerNews reports and sync website
    uses: ./.github/workflows/build-source-reports-reusable.yml
    with:
      source_key: hackernews
      source_label: HackerNews
    secrets:
      HARVESTER_PAT: ${{ secrets.HARVESTER_PAT }}
      COPILOT_PAT: ${{ secrets.COPILOT_PAT }}
      WEBSITE_PAT: ${{ secrets.WEBSITE_PAT }}

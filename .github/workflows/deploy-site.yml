name: Deploy AI Pulse Daily site

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'main.py'
      - 'mkdocs.yml'
      - 'hooks/**'
      - 'overrides/**'
      - 'pyproject.toml'
      - 'uv.lock'
      - '.github/workflows/deploy-site.yml'
  workflow_dispatch:

permissions: {}

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-site:
    name: Build site
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up uv
        uses: astral-sh/setup-uv@v8.0.0
      - name: Install deps
        run: uv sync --locked
      - name: Build MkDocs
        # run: uv run mkdocs build --strict
        run: uv run mkdocs build
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5.0.0
        with:
          path: site/

  deploy-site:
    name: Deploy to Pages
    needs: build-site
    permissions:
      pages: write
      id-token: write
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to Pages
        id: deployment
        uses: actions/deploy-pages@v5

  notify-subscribers:
    name: Notify subscribers
    needs: deploy-site
    permissions:
      contents: read
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - name: Checkout (with history)
        uses: actions/checkout@v6
        with:
          fetch-depth: 2
      - name: Detect new reports
        id: detect
        run: |
          # Newly added daily report markdown files, excluding .zh.md translations
          # and any non-date filenames like index.md.
          NEW_FILES=$(
            git diff --name-only --diff-filter=A HEAD~1 HEAD -- \
              'docs/reddit/**/*.md' 'docs/twitter/**/*.md' \
              'docs/hackernews/**/*.md' 'docs/youtube/**/*.md' \
            | grep -v '\.zh\.md$' \
            | grep -E '/[0-9]{4}-[0-9]{2}-[0-9]{2}\.md$' \
            || true
          )
          if [ -z "$NEW_FILES" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "No new report files detected."
            exit 0
          fi
          echo "skip=false" >> "$GITHUB_OUTPUT"
          FIRST_FILE=$(echo "$NEW_FILES" | head -1)
          SOURCE=$(echo "$FIRST_FILE" | cut -d'/' -f2)
          TOPIC=$(echo "$FIRST_FILE" | cut -d'/' -f3)
          DATE=$(basename "$FIRST_FILE" .md)
          COUNT=$(echo "$NEW_FILES" | wc -l)
          if [ "$COUNT" -gt 1 ]; then
            SUBJECT="New AI Pulse Daily: ${COUNT} new reports (${DATE})"
          else
            SUBJECT="New AI Pulse Daily report: ${SOURCE}/${TOPIC} ${DATE}"
          fi
          echo "subject=${SUBJECT}" >> "$GITHUB_OUTPUT"
          {
            echo 'files<<NEW_FILES_EOF'
            echo "$NEW_FILES"
            echo 'NEW_FILES_EOF'
          } >> "$GITHUB_OUTPUT"
      - name: Build digest body
        id: digest
        if: steps.detect.outputs.skip != 'true'
        env:
          NEW_FILES: ${{ steps.detect.outputs.files }}
        run: |
          BODY=$(printf '%s\n' "$NEW_FILES" | python3 scripts/build_newsletter_digest.py)
          echo "Rendered newsletter body ($(printf '%s' "$BODY" | wc -c) bytes):"
          printf '%s\n' "$BODY"
          delimiter="BODY_EOF_$(openssl rand -hex 16)"
          {
            echo "body<<${delimiter}"
            printf '%s\n' "$BODY"
            echo "${delimiter}"
          } >> "$GITHUB_OUTPUT"
      - name: Check newsletter config
        id: newsletter-config
        if: steps.detect.outputs.skip != 'true'
        env:
          NEWSLETTER_WORKER_URL: ${{ secrets.NEWSLETTER_WORKER_URL }}
          NEWSLETTER_SEND_KEY: ${{ secrets.NEWSLETTER_SEND_KEY }}
        run: |
          if [ -z "$NEWSLETTER_WORKER_URL" ] || [ -z "$NEWSLETTER_SEND_KEY" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "Newsletter secrets are not configured; skipping subscriber notification."
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Send newsletter
        if: steps.detect.outputs.skip != 'true' && steps.newsletter-config.outputs.configured == 'true'
        continue-on-error: true
        env:
          NEWSLETTER_WORKER_URL: ${{ secrets.NEWSLETTER_WORKER_URL }}
          NEWSLETTER_SEND_KEY: ${{ secrets.NEWSLETTER_SEND_KEY }}
          NEWSLETTER_SUBJECT: ${{ steps.detect.outputs.subject }}
          NEWSLETTER_HTML_BODY: ${{ steps.digest.outputs.body }}
        run: |
          WORKER_URL="${NEWSLETTER_WORKER_URL%/}"
          if ! printf '%s\n' "$WORKER_URL" | grep -Eq '^https?://'; then
            WORKER_URL="https://$WORKER_URL"
          fi

          jq -n \
            --arg subject "$NEWSLETTER_SUBJECT" \
            --arg html_body "$NEWSLETTER_HTML_BODY" \
            '{subject: $subject, html_body: $html_body}' > payload.json

          curl --fail-with-body -sS --retry 3 --retry-all-errors \
            -X POST "$WORKER_URL/api/send" \
            -H "Authorization: Bearer $NEWSLETTER_SEND_KEY" \
            -H "Content-Type: application/json" \
            --data @payload.json

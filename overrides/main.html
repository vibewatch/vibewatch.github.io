{% extends "base.html" %}
{% block extrahead %}
  {% if page %}
    {% if page.canonical_url %}
    <meta property="og:url" content="{{ page.canonical_url }}">
    {% endif %}
    {% if page.meta %}
      {% if page.meta.author %}
      <meta property="article:author" content="{{ page.meta.author }}">
      {% endif %}
      {% if page.meta.date %}
      <meta property="article:published_time" content="{{ page.meta.date }}">
      {% endif %}
      {% if page.meta.image %}
      <meta property="og:image" content="{{ page.meta.image }}">
      <meta name="twitter:image" content="{{ page.meta.image }}">
      {% endif %}
    {% endif %}
  {% endif %}
{% endblock %}
